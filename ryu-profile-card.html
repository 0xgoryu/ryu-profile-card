<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryu — Profile Card</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --card: #0d1220;
    --border: rgba(99,211,255,0.15);
    --accent: #63d3ff;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e8f0ff;
    --muted: #5a6a8a;
    --glow: rgba(99,211,255,0.25);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,211,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,211,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Ambient glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: blobFloat 8s ease-in-out infinite alternate;
  }
  .blob-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -3s; }
  .blob-3 { width: 200px; height: 200px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }

  @keyframes blobFloat {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(20px, 30px) scale(1.1); }
  }

  /* Card */
  .card {
    position: relative;
    width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px 32px;
    z-index: 10;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px var(--glow);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .card::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .card::after { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.3s both;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(99,211,255,0.08);
    border: 1px solid rgba(99,211,255,0.2);
    padding: 4px 10px;
    border-radius: 100px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--accent3);
    letter-spacing: 0.1em;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  }

  /* Avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.4s both;
  }

  .avatar-ring {
    position: relative;
    width: 96px; height: 96px;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
    animation: spin 4s linear infinite;
    z-index: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .avatar {
    position: relative;
    z-index: 1;
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a2a4a 0%, #0d1220 100%);
    border: 3px solid var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* Name + bio */
  .name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 10px;
    animation: fadeUp 0.6s 0.5s both;
  }

  .bio {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.6s both;
  }

  .bio strong {
    color: var(--accent2);
    font-weight: 700;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.65s both;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s 0.7s both;
  }

  .link-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.02);
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .link-row:hover {
    background: rgba(99,211,255,0.06);
    border-color: rgba(99,211,255,0.2);
    transform: translateX(4px);
  }

  .link-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .link-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
  }

  .link-value {
    font-size: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
  }

  .link-x .link-icon { background: rgba(255,255,255,0.05); color: #fff; }
  .link-discord .link-icon { background: rgba(114,137,218,0.12); color: #7289da; }
  .link-telegram .link-icon { background: rgba(36,161,222,0.12); color: #24a1de; }

  /* Badges */
  .badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.62s both;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
  }

  .badge-idolly { background: rgba(167,139,250,0.12); color: var(--accent2); border: 1px solid rgba(167,139,250,0.25); }
  .badge-coresight { background: rgba(99,211,255,0.08); color: var(--accent); border: 1px solid rgba(99,211,255,0.2); }
  .badge-writer { background: rgba(52,211,153,0.08); color: var(--accent3); border: 1px solid rgba(52,211,153,0.2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
